# Copy these keys into Streamlit Cloud secrets or a local `.streamlit/secrets.toml`.
# Never commit real passwords or connection strings.

APP_AUTH_ENABLED = true
APP_PASSWORD = "replace-with-a-private-app-password"
# Prefer APP_PASSWORD_HASH for shared deployments:
# APP_PASSWORD_HASH = "sha256-hex-digest-of-your-password"

DATABASE_URL = "mssql+pyodbc://<db-user>:<db-secret>@<server>.database.windows.net/<database>?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=yes&TrustServerCertificate=no"
# Streamlit Cloud alternative that avoids native ODBC setup:
# DATABASE_URL = "mssql+pymssql://<db-user>:<db-secret>@<server>.database.windows.net:1433/<database>"
SEED_SAMPLE_DATA = false
CREATE_TABLES_ON_STARTUP = false
RUN_STARTUP_JOBS = false
READ_CACHE_TTL_SECONDS = 3600
READ_CACHE_PERSIST = true
DB_CONNECT_TIMEOUT_SECONDS = 5
DB_POOL_PRE_PING = false
DB_RETRY_ATTEMPTS = 8
DB_RETRY_INITIAL_DELAY_SECONDS = 2
DB_RETRY_MAX_DELAY_SECONDS = 20
